<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIROFISH LIVE SCANNER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #09090e; color: #e2e8f0; font-family: sans-serif; }
    .glass-panel { background: rgba(13, 13, 23, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); }
    .price-up { color: #22c55e !important; }
    .price-down { color: #ef4444 !important; }
  </style>
</head>
<body class="p-4">
  <div class="max-w-4xl mx-auto space-y-6">
    <!-- Header Induk Pasar -->
    <div class="glass-panel p-6 rounded-2xl border-l-4 border-l-red-500">
      <h2 class="text-gray-400 text-xs uppercase font-bold tracking-widest">Induk Pasar / Anchor Alpha</h2>
      <div class="mt-2 flex items-baseline gap-4">
        <span id="main-btc-price" class="text-4xl font-black text-white">Loading...</span>
        <span id="main-btc-change" class="text-lg font-bold">0.00%</span>
      </div>
    </div>

    <!-- Tabel Data -->
    <div class="glass-panel rounded-2xl overflow-hidden">
      <table class="w-full text-left">
        <thead class="bg-white/5 text-gray-400 text-[10px] uppercase">
          <tr>
            <th class="p-4">Coin</th>
            <th class="p-4">Price (USDT)</th>
            <th class="p-4">24h Change</th>
          </tr>
        </thead>
        <tbody id="live-table" class="text-sm font-mono">
          <!-- Data akan diisi oleh JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Daftar koin yang ingin dipantau
    const watchList = ["BTC/USDT", "SOL/USDT", "ETH/USDT", "LINK/USDT", "AVAX/USDT"];

    async function updateMarketData() {
      try {
        // Menggunakan Proxy untuk bypass CORS (Standard untuk browser)
        const response = await fetch('https://api.allorigins.win/raw?url=https://api.bybit.com/v5/market/tickers?category=spot');
        const data = await response.json();
        const tickers = data.result.list;

        watchList.forEach(symbol => {
          const bybitSymbol = symbol.replace('/', '');
          const ticker = tickers.find(t => t.symbol === bybitSymbol);
          
          if (ticker) {
            const price = parseFloat(ticker.lastPrice).toLocaleString(undefined, {minimumFractionDigits: 2});
            const change = (parseFloat(ticker.price24hPcnt) * 100).toFixed(2);
            
            // Update BTC Utama
            if (symbol === "BTC/USDT") {
              document.getElementById('main-btc-price').textContent = `$${price}`;
              const elChange = document.getElementById('main-btc-change');
              elChange.textContent = `${change}%`;
              elChange.className = `text-lg font-bold ${change >= 0 ? 'price-up' : 'price-down'}`;
            }

            // Update baris tabel
            let row = document.getElementById(`row-${bybitSymbol}`);
            if (!row) {
              row = document.createElement('tr');
              row.id = `row-${bybitSymbol}`;
              document.getElementById('live-table').appendChild(row);
            }
            row.innerHTML = `
              <td class="p-4 font-bold">${symbol}</td>
              <td class="p-4">$${price}</td>
              <td class="p-4 ${change >= 0 ? 'price-up' : 'price-down'}">${change}%</td>
            `;
          }
        });
      } catch (e) {
        console.error("Gagal menarik data:", e);
      }
    }

    // Refresh setiap 3 detik
    setInterval(updateMarketData, 3000);
    updateMarketData(); // Jalankan sekali saat load
  </script>
</body>
</html>
