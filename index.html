<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIROFISH MISPRICING SCANNER</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  
  <style>
    body {
      background: #0f0f1a;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .pixel-font {
      font-family: 'Press Start 2P', monospace;
    }
    .neon-border {
      box-shadow: 0 0 0 1px rgba(255, 70, 70, 0.25), 0 0 12px rgba(255, 70, 70, 0.08);
    }
    .glass-panel {
      background: rgba(18, 18, 30, 0.85);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .candle-red { background: #ef4444; }
    .candle-green { background: #22c55e; }
    .glow-green { box-shadow: 0 0 18px rgba(34, 197, 94, 0.2); }
    .glow-red { box-shadow: 0 0 18px rgba(239, 68, 68, 0.25); }
    .pixel-text-shadow {
      text-shadow: 0 0 6px rgba(239, 68, 68, 0.6), 0 0 14px rgba(220, 38, 38, 0.3);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div id="root" class="w-full max-w-7xl"></div>

  <script type="text/babel">
    // ---- React 18 + ReactDOM via CDN ----
    const { createRoot, useState, useEffect, useRef } = React;

    // ---- Candlestick generator ----
    function generateCandles(count = 28) {
      let price = 78500;
      const candles = [];
      for (let i = 0; i < count; i++) {
        const change = (Math.random() - 0.58) * 280;
        const open = price;
        const close = open + change;
        const high = Math.max(open, close) + Math.random() * 120;
        const low = Math.min(open, close) - Math.random() * 120;
        candles.push({ open, high, low, close, up: close >= open });
        price = close;
      }
      return candles;
    }

    // ---- Relationship node positions (pre-calc) ----
    const nodes = [
      { x: 30, y: 70 }, { x: 28, y: 45 }, { x: 55, y: 30 },
      { x: 70, y: 55 }, { x: 58, y: 72 }, { x: 78, y: 80 },
      { x: 20, y: 22 }, { x: 88, y: 42 }, { x: 92, y: 70 },
    ];
    const edges = [
      [0,1],[1,2],[2,3],[3,4],[0,4],[0,5],[1,6],[2,7],[3,8],[4,8],[5,7],[6,2],[7,8]
    ];

    // ---- Main App ----
    function App() {
      const [candles] = useState(() => generateCandles(28));
      const [time, setTime] = useState(new Date());
      const canvasRef = useRef(null);

      // Digital clock
      useEffect(() => {
        const id = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(id);
      }, []);

      // Trigger Lucide Icons re-render on state changes
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });

      // Draw relationship graph on canvas
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        const w = rect.width;
        const h = rect.height;

        ctx.clearRect(0,0,w,h);

        // Edges — curved lines
        ctx.lineWidth = 1.2;
        edges.forEach(([i,j]) => {
          const a = nodes[i], b = nodes[j];
          const ax = a.x/100*w, ay = a.y/100*h;
          const bx = b.x/100*w, by = b.y/100*h;
          const cpx = (ax+bx)/2 + (by-ay)*0.2;
          const cpy = (ay+by)/2 - (bx-ax)*0.15;
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.quadraticCurveTo(cpx, cpy, bx, by);
          ctx.strokeStyle = 'rgba(250,200,50,0.3)';
          ctx.stroke();
        });

        // Nodes
        nodes.forEach((n,i) => {
          const x = n.x/100*w, y = n.y/100*h;
          const grad = ctx.createRadialGradient(x-3,y-3,2,x,y,12);
          grad.addColorStop(0, '#fbbf24');
          grad.addColorStop(0.4, '#ef4444');
          grad.addColorStop(1, 'rgba(239,68,68,0.1)');
          ctx.beginPath();
          ctx.arc(x, y, 9, 0, Math.PI*2);
          ctx.fillStyle = grad;
          ctx.fill();
          ctx.shadowColor = 'rgba(239,68,68,0.5)';
          ctx.shadowBlur = 14;
          ctx.beginPath();
          ctx.arc(x, y, 10, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(255,200,50,0.06)';
          ctx.fill();
          ctx.shadowBlur = 0;
        });

        // Downward trend line
        ctx.beginPath();
        ctx.moveTo(15/100*w, 25/100*h);
        ctx.quadraticCurveTo(45/100*w, 50/100*h, 92/100*w, 82/100*h);
        ctx.strokeStyle = 'rgba(239,68,68,0.5)';
        ctx.lineWidth = 2;
        ctx.setLineDash([6,6]);
        ctx.stroke();
        ctx.setLineDash([]);
      }, []);

      // Last price from candles
      const lastPrice = candles.length ? candles[candles.length-1].close : 76558;
      const currentPrice = lastPrice.toFixed(0);

      // PnL Curve area data (simulated)
      const pnlPoints = [0.12,0.18,0.24,0.21,0.30,0.26,0.35,0.32,0.40,0.38,0.48,0.45,0.55,0.52,0.65,0.62,0.72,0.78,0.82,0.88,0.92,0.98];

      return (
        <div className="space-y-4 w-full">
          {/* ========== HEADER ========== */}
          <div className="glass-panel rounded-2xl p-5 neon-border">
            <div className="flex flex-col lg:flex-row lg:items-center gap-4">
              {/* Left */}
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-3 flex-wrap">
                  <span className="text-gray-400 text-sm font-medium">@gobblewobble</span>
                  <span className="text-white/20 hidden sm:inline">|</span>
                  <h1 className="text-white/90 font-bold text-lg tracking-wide">MIROFISH MISPRICING SCANNER</h1>
                </div>
                <div className="flex items-center gap-4 mt-2 text-sm text-gray-400">
                  <span className="flex items-center gap-1">
                    <i data-lucide="clock" className="w-3.5 h-3.5"></i>
                    <span>{time.toISOString().slice(11,19)} UTC</span>
                  </span>
                  <span className="flex items-center gap-1 font-mono text-xs text-gray-500">
                    <i data-lucide="wallet" className="w-3.5 h-3.5 text-yellow-500"></i>
                    0x0fe9...d3a1b7
                  </span>
                </div>
              </div>
              {/* Right — PnL */}
              <div className="text-left lg:text-right shrink-0">
                <div className="text-gray-500 text-xs uppercase tracking-wider">Unrealized PnL</div>
                <div className="pixel-font text-3xl sm:text-4xl text-red-500 pixel-text-shadow mt-1 leading-tight">
                  $390,607
                </div>
              </div>
            </div>
          </div>

          {/* ========== MIDDLE ROW ========== */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {/* Relationship Graph — spans 2 cols */}
            <div className="lg:col-span-2 glass-panel rounded-2xl p-4 neon-border">
              <div className="flex items-center justify-between mb-3">
                <h2 className="text-gray-300 font-semibold text-sm tracking-wide">Relationship Graph Simulation</h2>
                <span className="text-xs text-gray-600 flex items-center gap-1">
                  <i data-lucide="activity" className="w-3.5 h-3.5"></i> live
                </span>
              </div>
              <div className="relative w-full" style={{ height: 200 }}>
                <canvas ref={canvasRef} className="absolute inset-0 w-full h-full"></canvas>
              </div>
            </div>

            {/* Order Panel */}
            <div className="glass-panel rounded-2xl p-5 neon-border flex flex-col justify-center items-center gap-4">
              <div className="text-center">
                <div className="text-gray-500 text-xs uppercase tracking-wider mb-1">Pair</div>
                <div className="text-white text-lg font-semibold">ETH / USD</div>
              </div>
              <div className="flex items-center gap-2 text-sm text-gray-400">
                <span className="flex items-center gap-1">
                  <i data-lucide="trending-down" className="w-4 h-4 text-red-400"></i> -2.4%
                </span>
                <span className="text-white/20">|</span>
                <span className="text-gray-500">R:R 1:2.8</span>
              </div>
              <button className="w-full bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-bold py-3 rounded-xl tracking-wider transition-all duration-150 shadow-lg shadow-red-900/40">
                SHORT ETH 2.0 R:R
              </button>
              <div className="text-[10px] text-gray-600 font-mono">Entry: $3,210 / SL: $3,380</div>
            </div>
          </div>

          {/* ========== LIVE SPOT FEED ========== */}
          <div className="glass-panel rounded-2xl p-5 neon-border">
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-gray-300 font-semibold text-sm tracking-wide">Live Spot Feed</h2>
              <div className="flex items-center gap-2 text-xs text-gray-500">
                <span className="px-2 py-0.5 rounded bg-white/5">1H</span>
                <span>BTC/USD</span>
              </div>
            </div>
            <div className="flex flex-col sm:flex-row sm:items-end gap-4">
              {/* Candles */}
              <div className="flex-1 flex items-end gap-[3px] h-28">
                {candles.slice(-30).map((c, i) => (
                  <div key={i} className="flex-1 flex flex-col items-center justify-end h-full">
                    <div
                      className={`w-full rounded-sm ${c.up ? 'candle-green glow-green' : 'candle-red glow-red'}`}
                      style={{
                        height: `${Math.max(6, Math.abs(c.close - c.open) / 8)}px`,
                        opacity: 0.85
                      }}
                    ></div>
                    <div
                      className="w-[2px] bg-white/10 rounded-full mt-0.5"
                      style={{ height: `${Math.max(4, (c.high - c.low) / 18)}px` }}
                    ></div>
                  </div>
                ))}
              </div>
              {/* Price */}
              <div className="text-right shrink-0">
                <div className="text-gray-500 text-xs">Last Price</div>
                <div className="text-3xl font-bold text-white">${Number(currentPrice).toLocaleString()}</div>
                <div className="text-xs text-red-400 flex items-center justify-end gap-1 mt-0.5">
                  <i data-lucide="chevron-down" className="w-3.5 h-3.5"></i> -1.83%
                </div>
              </div>
            </div>
          </div>

          {/* ========== BOTTOM METRICS ========== */}
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            {/* Stats */}
            <div className="glass-panel rounded-2xl p-5 neon-border">
              <div className="text-gray-500 text-xs uppercase tracking-wider mb-2">Trading Stats</div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <div className="text-2xl font-bold text-white">1,259</div>
                  <div className="text-xs text-gray-500">Total Trades</div>
                </div>
                <div>
                  <div className="text-2xl font-bold text-green-400">78%</div>
                  <div className="text-xs text-gray-500">Win Rate</div>
                </div>
              </div>
            </div>

            {/* Win Stack */}
            <div className="glass-panel rounded-2xl p-5 neon-border">
              <div className="text-gray-500 text-xs uppercase tracking-wider mb-2">Win Stack</div>
              <div className="flex h-8 rounded-full overflow-hidden border border-white/5">
                <div className="bg-green-500/70" style={{ width: '78%' }}></div>
                <div className="bg-red-500/60" style={{ width: '22%' }}></div>
              </div>
              <div className="flex justify-between text-xs mt-2 text-gray-500">
                <span>Wins 78%</span>
                <span>Loss 22%</span>
              </div>
            </div>

            {/* PnL Curve */}
            <div className="glass-panel rounded-2xl p-5 neon-border">
              <div className="text-gray-500 text-xs uppercase tracking-wider mb-2">PnL Curve</div>
              <div className="relative h-16 w-full">
                <svg viewBox="0 0 100 24" className="w-full h-full" preserveAspectRatio="none">
                  <defs>
                    <linearGradient id="pnlGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#22c55e" stopOpacity="0.45"/>
                      <stop offset="100%" stopColor="#22c55e" stopOpacity="0.02"/>
                    </linearGradient>
                  </defs>
                  <path
                    d={pnlPoints.map((p,i) => `${i===0?'M':'L'} ${(i/(pnlPoints.length-1))*100} ${24-p*22}`).join(' ')}
                    fill="none" stroke="#22c55e" strokeWidth="1.5" className="drop-shadow-lg"
                  />
                  <path
                    d={`${pnlPoints.map((p,i) => `${i===0?'M':'L'} ${(i/(pnlPoints.length-1))*100} ${24-p*22}`).join(' ')} L 100 24 L 0 24 Z`}
                    fill="url(#pnlGrad)"
                  />
                </svg>
              </div>
              <div className="flex justify-between text-xs text-gray-600 mt-1">
                <span>Jan</span>
                <span className="text-green-400 font-semibold">+$390.6K</span>
                <span>Jun</span>
              </div>
            </div>
          </div>

          {/* Footer credit */}
          <div className="text-center text-[10px] text-gray-700 tracking-widest pt-2">
            MIROFISH · MISPRICING SCANNER v2.4.1
          </div>
        </div>
      );
    }

    // ---- Mount ----
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
