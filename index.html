<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIROFISH ELITE SCANNER PRO (LIVE API INTEGRATED)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { background: #09090e; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: #e2e8f0; }
    .glass-panel { background: rgba(13, 13, 23, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.04); }
    .custom-scroll::-webkit-scrollbar { height: 6px; width: 5px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(34, 197, 94, 0.3); border-radius: 4px; }
    .price-up { color: #22c55e !important; }
    .price-down { color: #ef4444 !important; }
  </style>
</head>
<body class="p-4 flex flex-col items-center">

  <div class="w-full max-w-7xl space-y-4">
    <div class="glass-panel rounded-2xl p-4 border border-white/5">
      <h1 class="text-white font-bold text-lg uppercase tracking-wide">Mirofish Elite Scanner Pro</h1>
      <p class="text-xs text-gray-400" id="status-engine">Engine Loading... Fetching Market Pairs...</p>
    </div>

    <div class="glass-panel rounded-2xl p-4 overflow-x-auto custom-scroll">
      <table class="w-full text-left border-collapse min-w-[800px]">
        <thead>
          <tr class="text-gray-400 font-mono text-[11px] uppercase border-b border-white/10">
            <th class="p-3">Pair</th>
            <th class="p-3">Price (USDT)</th>
            <th class="p-3">24h Change</th>
          </tr>
        </thead>
        <tbody id="scanner-rows" class="text-xs font-mono text-gray-300"></tbody>
      </table>
    </div>
  </div>

  <script>
    let masterCoinList = [];

    // 1. Fungsi Mengambil Data Koin dari CoinGecko
    async function initializeSystem() {
      const statusEl = document.getElementById('status-engine');
      try {
        statusEl.textContent = "Connecting to CoinGecko...";
        const response = await fetch("https://api.coingecko.com/api/v3/coins/list");
        const coins = await response.json();

        // Mapping ke format yang dibutuhkan scanner
        masterCoinList = coins.slice(0, 50).map(c => ({
          id: c.id,
          coin: `${c.symbol.toUpperCase()}/USDT`,
          name: c.name,
          price: 0,
          change: 0
        }));

        statusEl.textContent = "Engine Core Active - Live Data Syncing";
        fetchMarketPrices();
      } catch (err) {
        statusEl.textContent = "Error: Failed to fetch market pairs.";
      }
    }

    // 2. Fungsi Mengambil Harga Real-time
    async function fetchMarketPrices() {
      if (masterCoinList.length === 0) return;
      
      try {
        const ids = masterCoinList.map(c => c.id).join(',');
        const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}`;
        const response = await fetch(url);
        const data = await response.json();

        data.forEach(m => {
          const index = masterCoinList.findIndex(c => c.id === m.id);
          if (index !== -1) {
            masterCoinList[index].price = m.current_price;
            masterCoinList[index].change = m.price_change_percentage_24h;
          }
        });

        renderTable();
      } catch (e) {
        console.error("Market fetch error:", e);
      }
      setTimeout(fetchMarketPrices, 30000); // Auto-update tiap 30 detik
    }

    // 3. Render Tabel
    function renderTable() {
      const tbody = document.getElementById('scanner-rows');
      tbody.innerHTML = masterCoinList.map(item => `
        <tr class="border-b border-white/5 hover:bg-white/5">
          <td class="p-3 text-white font-bold">${item.coin}</td>
          <td class="p-3">$${item.price.toLocaleString()}</td>
          <td class="p-3 ${item.change >= 0 ? 'price-up' : 'price-down'}">
            ${item.change >= 0 ? '+' : ''}${item.change.toFixed(2)}%
          </td>
        </tr>
      `).join('');
    }

    // Jalankan sistem
    window.onload = initializeSystem;
  </script>
</body>
</html>
