<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIROFISH MISPRICING SCANNER</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  
  <style>
    body {
      background: #0f0f1a;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #e2e8f0;
    }
    .pixel-font {
      font-family: 'Press Start 2P', monospace;
    }
    .neon-border {
      box-shadow: 0 0 0 1px rgba(255, 70, 70, 0.25), 0 0 12px rgba(255, 70, 70, 0.08);
    }
    .glass-panel {
      background: rgba(18, 18, 30, 0.85);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .candle-red { background: #ef4444; }
    .candle-green { background: #22c55e; }
    .glow-green { box-shadow: 0 0 18px rgba(34, 197, 94, 0.2); }
    .glow-red { box-shadow: 0 0 18px rgba(239, 68, 68, 0.25); }
    .pixel-text-shadow {
      text-shadow: 0 0 6px rgba(239, 68, 68, 0.6), 0 0 14px rgba(220, 38, 38, 0.3);
    }
    /* Sembunyikan scrollbar bawaan untuk estetika */
    .custom-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: rgba(239, 68, 68, 0.3);
      border-radius: 4px;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-7xl space-y-4">
    
    <div class="glass-panel rounded-2xl p-5 neon-border">
      <div class="flex flex-col lg:flex-row lg:items-center gap-4">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-3 flex-wrap">
            <span class="text-gray-400 text-sm font-medium">@gobblewobble</span>
            <span class="text-white/20 hidden sm:inline">|</span>
            <h1 class="text-white/90 font-bold text-lg tracking-wide">MIROFISH MISPRICING SCANNER</h1>
          </div>
          <div class="flex items-center gap-4 mt-2 text-sm text-gray-400">
            <span class="flex items-center gap-1">
              <i data-lucide="clock" class="w-3.5 h-3.5"></i>
              <span id="digital-clock">00:00:00 UTC</span>
            </span>
            <span class="flex items-center gap-1 font-mono text-xs text-gray-500">
              <i data-lucide="wallet" class="w-3.5 h-3.5 text-yellow-500"></i>
              0x0fe9...d3a1b7
            </span>
          </div>
        </div>
        <div class="text-left lg:text-right shrink-0">
          <div class="text-gray-500 text-xs uppercase tracking-wider">Unrealized PnL</div>
          <div class="pixel-font text-2xl sm:text-3xl text-red-500 pixel-text-shadow mt-1 leading-tight">
            $390,607
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      
      <div class="glass-panel rounded-2xl p-4 neon-border flex flex-col h-[230px]">
        <div class="flex items-center gap-2 bg-black/40 px-3 py-2 rounded-xl border border-white/10 mb-3">
          <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
          <input 
            type="text" 
            id="searchPairInput" 
            placeholder="Search pair... (e.g. BTC, SOL)" 
            class="bg-transparent text-sm text-white focus:outline-none w-full placeholder-gray-500"
            oninput="filterPairs()"
          />
        </div>
        <div id="pairListContainer" class="flex-1 overflow-y-auto custom-scroll space-y-1 pr-1">
          </div>
      </div>

      <div class="glass-panel rounded-2xl p-4 neon-border flex flex-col justify-between h-[230px]">
        <div class="flex items-center justify-between mb-1">
          <h2 class="text-gray-300 font-semibold text-sm tracking-wide">Relationship Graph Simulation</h2>
          <span class="text-xs text-gray-600 flex items-center gap-1">
            <i data-lucide="activity" class="w-3.5 h-3.5 animate-pulse text-red-500"></i> live
          </span>
        </div>
        <div class="relative w-full flex-1">
          <canvas id="graphCanvas" class="absolute inset-0 w-full h-full"></canvas>
        </div>
      </div>

      <div class="glass-panel rounded-2xl p-5 neon-border flex flex-col justify-center items-center gap-4 h-[230px]">
        <div class="text-center">
          <div class="text-gray-500 text-xs uppercase tracking-wider mb-1">Active Pair</div>
          <div id="active-pair-title" class="text-white text-2xl font-bold tracking-wide">ETH / USD</div>
        </div>
        <button id="action-button-text" class="w-full bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-bold py-3 rounded-xl tracking-wider transition-all shadow-md shadow-red-900/30 text-sm">
          SHORT ETH 2.0 R:R
        </button>
      </div>
    </div>

    <div class="glass-panel rounded-2xl p-5 neon-border">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-gray-300 font-semibold text-sm tracking-wide flex items-center gap-2">
          Live Spot Feed <span id="sync-status" class="text-xs text-green-400">● Live Connected</span>
        </h2>
        <div class="text-xs text-gray-500">Auto-refresh Active</div>
      </div>

      <div class="flex flex-col sm:flex-row sm:items-end gap-6">
        <div id="candle-container" class="flex-1 flex items-end gap-[5px] h-24 bg-black/20 p-2 rounded-lg border border-white/5">
          </div>
        
        <div class="text-right shrink-0">
          <div class="text-gray-500 text-xs">Last Price</div>
          <div id="last-price-display" class="text-3xl font-bold text-white tracking-tight">
            $76,558.00
          </div>
          <div id="price-change-display" class="text-xs mt-1 font-semibold text-red-400">
            -1.83%
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // DATA DATABASE PAIR CRYPTO UTAMA
    const cryptoDatabase = [
      { name: "ETH / USD", basePrice: 3450.00, change: -1.83 },
      { name: "BTC / USD", basePrice: 96420.00, change: 2.45 },
      { name: "SOL / USD", basePrice: 182.50, change: 5.12 },
      { name: "BNB / USD", basePrice: 590.25, change: -0.42 },
      { name: "XRP / USD", basePrice: 1.14, change: -3.15 },
      { name: "ADA / USD", basePrice: 0.62, change: 0.85 },
      { name: "DOT / USD", basePrice: 6.45, change: 1.22 },
      { name: "DOGE / USD", basePrice: 0.38, change: 12.40 },
      { name: "LINK / USD", basePrice: 17.80, change: -2.10 },
      { name: "AVAX / USD", basePrice: 34.15, change: 4.67 }
    ];

    let currentSelectedPair = cryptoDatabase[0]; // Default awal ETH/USD

    // 1. Fungsi Jam Digital
    function updateClock() {
      const clockElement = document.getElementById('digital-clock');
      if (clockElement) {
        const now = new Date();
        clockElement.textContent = now.toISOString().slice(11, 19) + ' UTC';
      }
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. Merender & Membuat Daftar Elemen Pair ke Menu Samping
    function renderPairList(pairsToRender) {
      const listContainer = document.getElementById('pairListContainer');
      if (!listContainer) return;
      listContainer.innerHTML = '';

      pairsToRender.forEach(pair => {
        const isSelected = pair.name === currentSelectedPair.name;
        const pairRow = document.createElement('div');
        
        // Desain Baris List Pair
        pairRow.className = `flex items-center justify-between p-2 rounded-xl cursor-pointer transition-all text-xs border ${
          isSelected 
            ? 'bg-red-500/10 border-red-500/40 text-white font-bold' 
            : 'bg-white/[0.02] border-transparent hover:bg-white/[0.06] text-gray-400'
        }`;
        
        pairRow.onclick = () => selectPair(pair);

        pairRow.innerHTML = `
          <div class="flex items-center gap-2">
            <i data-lucide="trending-up" class="w-3.5 h-3.5 ${pair.change >= 0 ? 'text-green-400' : 'text-red-400'}"></i>
            <span>${pair.name}</span>
          </div>
          <span class="${pair.change >= 0 ? 'text-green-400' : 'text-red-400'}">
            ${pair.change >= 0 ? '+' : ''}${pair.change}%
          </span>
        `;
        listContainer.appendChild(pairRow);
      });
      
      if (window.lucide) window.lucide.createIcons();
    }

    // 3. Fungsi Filter Pencarian (Search Engine)
    function filterPairs() {
      const searchKeyword = document.getElementById('searchPairInput').value.toUpperCase();
      const filtered = cryptoDatabase.filter(pair => pair.name.toUpperCase().includes(searchKeyword));
      renderPairList(filtered);
    }

    // 4. Fungsi Saat User Memilih Salah Satu Pair
    function selectPair(pair) {
      currentSelectedPair = pair;
      
      // Update UI Panel Order secara instan
      document.getElementById('active-pair-title').textContent = pair.name;
      document.getElementById('action-button-text').textContent = `SHORT ${pair.name.split(' ')[0]} 2.0 R:R`;
      
      // Refresh database list & feed grafik
      filterPairs();
      loadScreenerData();
    }

    // 5. Membuat Pergerakan Lilin Candlestick Dekoratif
    function renderCandles() {
      const container = document.getElementById('candle-container');
      if (!container) return;
      container.innerHTML = '';

      for (let i = 0; i < 26; i++) {
        const isUp = Math.random() > 0.48;
        const height = Math.floor(Math.random() * 55) + 12;
        
        const candleWrapper = document.createElement('div');
        candleWrapper.className = 'flex-1 flex flex-col items-center justify-end h-full';
        
        const candleBody = document.createElement('div');
        candleBody.className = `w-full rounded-sm ${isUp ? 'candle-green glow-green' : 'candle-red glow-red'}`;
        candleBody.style.height = `${height}px`;
        candleBody.style.opacity = '0.85';
        
        candleWrapper.appendChild(candleBody);
        container.appendChild(candleWrapper);
      }
    }

    // 6. Sinkronisasi Data harga Utama
    async function loadScreenerData() {
      const statusElement = document.getElementById('sync-status');
      const priceElement = document.getElementById('last-price-display');
      const changeElement = document.getElementById('price-change-display');

      if (statusElement) statusElement.textContent = '● Syncing...';

      try {
        // Pemicu file lokal JSON Anda
        const response = await fetch('screener-data.json?t=' + new Date().getTime());
        if (!response.ok) throw new Error("Fallback");
        const data = await response.json();

        // Jika user memilih ETH/USD default, pakai data real dari screener-data.json Anda
        if (currentSelectedPair.name === "ETH / USD" && data && Array.isArray(data) && data.length > 0) {
          const lastData = data[data.length - 1];
          if (lastData.price) priceElement.textContent = '$' + Number(lastData.price).toLocaleString(undefined, {minimumFractionDigits: 2});
          if (lastData.change) {
            const chg = Number(lastData.change);
            changeElement.textContent = (chg >= 0 ? '+' : '') + chg + '%';
            changeElement.className = `text-xs mt-1 font-semibold ${chg >= 0 ? 'text-green-400' : 'text-red-400'}`;
          }
        } else {
          // Jika memilih pair hasil search lain, generate kalkulasi fluktuasi harga dari database utama
          throw new Error("Pindah Pair");
        }
        if (statusElement) statusElement.textContent = '● Live Connected';
      } catch (error) {
        if (statusElement) statusElement.textContent = '● Scanner Active';
        
        // Memberikan sedikit pergerakan dinamis acak pada harga bursa agar terasa hidup
        const liveFluctuation = currentSelectedPair.basePrice + (Math.random() - 0.5) * (currentSelectedPair.basePrice * 0.002);
        
        priceElement.textContent = '$' + liveFluctuation.toLocaleString(undefined, {
          minimumFractionDigits: currentSelectedPair.basePrice < 5 ? 4 : 2,
          maximumFractionDigits: currentSelectedPair.basePrice < 5 ? 4 : 2
        });

        const chgVal = currentSelectedPair.change;
        changeElement.textContent = (chgVal >= 0 ? '+' : '') + chgVal + '%';
        changeElement.className = `text-xs mt-1 font-semibold ${chgVal >= 0 ? 'text-green-400' : 'text-red-400'}`;
      }
      
      renderCandles();
    }

    // Interval Update Loop
    setInterval(loadScreenerData, 5000);

    // 7. Menggambar Jaringan Visual Simetris (Canvas)
    function drawGraph() {
      const canvas = document.getElementById('graphCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      
      const w = canvas.parentNode.clientWidth;
      const h = canvas.parentNode.clientHeight;
      canvas.width = w;
      canvas.height = h;

      const points = [
        {x: w*0.1, y: h*0.4}, {x: w*0.22, y: h*0.25}, {x: w*0.45, y: h*0.6},
        {x: w*0.6, y: h*0.3}, {x: w*0.78, y: h*0.7}, {x: w*0.92, y: h*0.45}
      ];

      ctx.strokeStyle = 'rgba(251, 191, 36, 0.2)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      for(let i=0; i<points.length - 1; i++) {
        ctx.moveTo(points[i].x, points[i].y);
        ctx.lineTo(points[i+1].x, points[i+1].y);
      }
      ctx.stroke();

      points.forEach(p => {
        ctx.fillStyle = '#ef4444';
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#ef4444';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    // Booting / Inisialisasi Sistem Pertama Kali Layar Terbuka
    window.onload = () => {
      renderPairList(cryptoDatabase);
      loadScreenerData();
      setTimeout(drawGraph, 400);
    };
    window.addEventListener('resize', drawGraph);
  </script>
</body>
</html>
