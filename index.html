<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIROFISH MISPRICING SCANNER</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  
  <style>
    body {
      background: #0f0f1a;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #e2e8f0;
    }
    .pixel-font {
      font-family: 'Press Start 2P', monospace;
    }
    .neon-border {
      box-shadow: 0 0 0 1px rgba(255, 70, 70, 0.25), 0 0 12px rgba(255, 70, 70, 0.08);
    }
    .glass-panel {
      background: rgba(18, 18, 30, 0.85);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .candle-red { background: #ef4444; }
    .candle-green { background: #22c55e; }
    .glow-green { box-shadow: 0 0 18px rgba(34, 197, 94, 0.2); }
    .glow-red { box-shadow: 0 0 18px rgba(239, 68, 68, 0.25); }
    .pixel-text-shadow {
      text-shadow: 0 0 6px rgba(239, 68, 68, 0.6), 0 0 14px rgba(220, 38, 38, 0.3);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-7xl space-y-4">
    
    <div class="glass-panel rounded-2xl p-5 neon-border">
      <div class="flex flex-col lg:flex-row lg:items-center gap-4">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-3 flex-wrap">
            <span class="text-gray-400 text-sm font-medium">@gobblewobble</span>
            <span class="text-white/20 hidden sm:inline">|</span>
            <h1 class="text-white/90 font-bold text-lg tracking-wide">MIROFISH MISPRICING SCANNER</h1>
          </div>
          <div class="flex items-center gap-4 mt-2 text-sm text-gray-400">
            <span class="flex items-center gap-1">
              <i data-lucide="clock" class="w-3.5 h-3.5"></i>
              <span id="digital-clock">00:00:00 UTC</span>
            </span>
            <span class="flex items-center gap-1 font-mono text-xs text-gray-500">
              <i data-lucide="wallet" class="w-3.5 h-3.5 text-yellow-500"></i>
              0x0fe9...d3a1b7
            </span>
          </div>
        </div>
        <div class="text-left lg:text-right shrink-0">
          <div class="text-gray-500 text-xs uppercase tracking-wider">Unrealized PnL</div>
          <div class="pixel-font text-2xl sm:text-3xl text-red-500 pixel-text-shadow mt-1 leading-tight">
            $390,607
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div class="lg:col-span-2 glass-panel rounded-2xl p-4 neon-border">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-gray-300 font-semibold text-sm tracking-wide">Relationship Graph Simulation</h2>
          <span class="text-xs text-gray-600 flex items-center gap-1">
            <i data-lucide="activity" class="w-3.5 h-3.5 animate-pulse text-red-500"></i> live
          </span>
        </div>
        <div class="relative w-full" style="height: 160px;">
          <canvas id="graphCanvas" class="absolute inset-0 w-full h-full"></canvas>
        </div>
      </div>

      <div class="glass-panel rounded-2xl p-5 neon-border flex flex-col justify-center items-center gap-4">
        <div class="text-center">
          <div class="text-gray-500 text-xs uppercase tracking-wider mb-1">Pair</div>
          <div class="text-white text-xl font-bold">ETH / USD</div>
        </div>
        <button class="w-full bg-red-600 hover:bg-red-700 active:bg-red-800 text-white font-bold py-3 rounded-xl tracking-wider transition-all shadow-md shadow-red-900/30">
          SHORT ETH 2.0 R:R
        </button>
      </div>
    </div>

    <div class="glass-panel rounded-2xl p-5 neon-border">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-gray-300 font-semibold text-sm tracking-wide flex items-center gap-2">
          Live Spot Feed <span id="sync-status" class="text-xs text-green-400">● Live Connected</span>
        </h2>
        <div class="text-xs text-gray-500">Auto-refresh Active</div>
      </div>

      <div class="flex flex-col sm:flex-row sm:items-end gap-6">
        <div id="candle-container" class="flex-1 flex items-end gap-[5px] h-24 bg-black/20 p-2 rounded-lg border border-white/5">
          </div>
        
        <div class="text-right shrink-0">
          <div class="text-gray-500 text-xs">Last Price</div>
          <div id="last-price-display" class="text-3xl font-bold text-white tracking-tight">
            $76,558.00
          </div>
          <div id="price-change-display" class="text-xs mt-1 font-semibold text-red-400">
            -1.83%
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // 1. Fungsi Jam Digital
    function updateClock() {
      const clockElement = document.getElementById('digital-clock');
      if (clockElement) {
        const now = new Date();
        clockElement.textContent = now.toISOString().slice(11, 19) + ' UTC';
      }
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. Simulasi Data Awal Lilin (Candlestick)
    function renderCandles() {
      const container = document.getElementById('candle-container');
      if (!container) return;
      container.innerHTML = '';

      // Membuat 24 batang lilin acak dekoratif
      for (let i = 0; i < 24; i++) {
        const isUp = Math.random() > 0.45;
        const height = Math.floor(Math.random() * 50) + 15;
        
        const candleWrapper = document.createElement('div');
        candleWrapper.className = 'flex-1 flex flex-col items-center justify-end h-full';
        
        const candleBody = document.createElement('div');
        candleBody.className = `w-full rounded-sm ${isUp ? 'candle-green glow-green' : 'candle-red glow-red'}`;
        candleBody.style.height = `${height}px`;
        candleBody.style.opacity = '0.85';
        
        candleWrapper.appendChild(candleBody);
        container.appendChild(candleWrapper);
      }
    }

    // 3. Sistem Pengambilan Data Terintegrasi screener-data.json
    async function loadScreenerData() {
      const statusElement = document.getElementById('sync-status');
      const priceElement = document.getElementById('last-price-display');
      const changeElement = document.getElementById('price-change-display');

      if (statusElement) statusElement.textContent = '● Syncing...';

      try {
        // Mengambil data langsung dari file lokal Anda di GitHub
        const response = await fetch('screener-data.json?t=' + new Date().getTime());
        if (!response.ok) throw new Error("File tidak ditemukan");
        
        const data = await response.json();

        if (data && Array.isArray(data) && data.length > 0) {
          const lastData = data[data.length - 1]; // Ambil entri data paling baru
          
          if (lastData.price) {
            priceElement.textContent = '$' + Number(lastData.price).toLocaleString(undefined, {minimumFractionDigits: 2});
          }
          if (lastData.change) {
            const changeVal = Number(lastData.change);
            changeElement.textContent = (changeVal >= 0 ? '+' : '') + changeVal + '%';
            changeElement.className = `text-xs mt-1 font-semibold ${changeVal >= 0 ? 'text-green-400' : 'text-red-400'}`;
          }
        }
        if (statusElement) statusElement.textContent = '● Live Connected';
      } catch (error) {
        // Jika file json kosong, sistem tetap berjalan normal menggunakan data aman bawaan
        if (statusElement) statusElement.textContent = '● Simulation Mode';
        // Variasi harga acak agar web terlihat hidup dinamis
        const mockPrice = 76558 + (Math.random() - 0.5) * 60;
        priceElement.textContent = '$' + mockPrice.toLocaleString(undefined, {minimumFractionDigits: 2});
      }
      
      renderCandles();
    }

    // Jalankan sistem pembaca data otomatis setiap 6 detik
    setInterval(loadScreenerData, 6000);
    loadScreenerData();

    // 4. Menggambar Grafis Jaringan (Canvas)
    function drawGraph() {
      const canvas = document.getElementById('graphCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      canvas.width = w;
      canvas.height = h;

      const points = [
        {x: w*0.15, y: h*0.3}, {x: w*0.35, y: h*0.15}, {x: w*0.6, y: h*0.4},
        {x: w*0.8, y: h*0.2}, {x: w*0.25, y: h*0.7}, {x: w*0.5, y: h*0.8},
        {x: w*0.75, y: h*0.65}, {x: w*0.9, y: h*0.5}
      ];

      // Garis penghubung antar titik
      ctx.strokeStyle = 'rgba(251, 191, 36, 0.2)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for(let i=0; i<points.length - 1; i++) {
        ctx.moveTo(points[i].x, points[i].y);
        ctx.lineTo(points[i+1].x, points[i+1].y);
      }
      ctx.stroke();

      // Bulatan Titik Node jaringan
      points.forEach(p => {
        ctx.fillStyle = '#ef4444';
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#ef4444';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    
    // Tunggu komponen siap lalu gambar grafik
    setTimeout(drawGraph, 500);
    window.addEventListener('resize', drawGraph);

    // Inisialisasi Ikon Lucide
    if (window.lucide) {
      window.lucide.createIcons();
    }
  </script>
</body>
</html>
